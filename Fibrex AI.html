<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibrex AI - خبير الأناقة السودانية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-chat: #f8fafc;
            --border-light: #e2e8f0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb; 
            --primary-hover: #1d4ed8;
            --code-bg: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background-color: var(--bg-main);
            border-bottom: 1px solid var(--border-light);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 20px;
            color: var(--text-main);
        }

        .brand i { color: var(--primary); }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .new-chat-btn:hover { background: var(--bg-chat); border-color: #cbd5e1; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            background-color: var(--bg-main);
        }

        .message-wrapper {
            padding: 28px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.02);
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-wrapper.user-message { background-color: var(--bg-chat); }

        .message-content {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            min-width: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
        }

        .avatar.ai { background: linear-gradient(135deg, #2563eb, #7c3aed); }
        .avatar.user { background-color: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        .text-content {
            flex: 1;
            font-size: 16px;
            line-height: 1.8;
            color: #334155;
            padding-top: 2px;
        }

        .user-message .text-content { font-weight: 500; color: #1e293b; }

        .text-content p { margin-bottom: 15px; }
        .text-content ul, .text-content ol { margin-bottom: 15px; padding-right: 25px; }
        .text-content li { margin-bottom: 8px; }
        .text-content pre {
            background-color: #1e293b;
            color: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            margin: 15px 0;
            direction: ltr;
            font-family: monospace;
            overflow-x: auto;
        }

        /* --- تعديل منطقة الإدخال لتصبح مرفوعة قليلاً --- */
        .input-container {
            padding: 10px 20px 35px 20px; /* زيادة الرقم الأخير يرفعها عن أسفل الشاشة */
            background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 40%);
            display: flex;
            justify-content: center;
        }

        .input-box {
            max-width: 850px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 10px 15px;
            display: flex;
            align-items: flex-end;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 10px; /* يضيف مسافة إضافية من الأسفل */
        }
        /* ----------------------------------------------- */

        .input-box:focus-within { border-color: var(--primary); box-shadow: 0 10px 40px rgba(37, 99, 235, 0.15); }

        #user-input {
            flex: 1;
            border: none;
            background: transparent;
            resize: none;
            padding: 8px;
            font-size: 15px;
            outline: none;
            color: var(--text-main);
            height: 40px;
            max-height: 150px;
        }

        .send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 2px;
        }

        .send-btn:hover { transform: scale(1.05); background: var(--primary-hover); }
        .send-btn:disabled { background: #e2e8f0; cursor: not-allowed; }

        .typing-indicator { display: none; padding: 20px; }
        .typing-content { max-width: 850px; margin: 0 auto; display: flex; gap: 20px; align-items: center; }
        .dots { display: flex; gap: 4px; }
        .dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.4; } 50% { transform: scale(1.2); opacity: 1; } }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 40px;
        }

        .welcome-icon { font-size: 60px; color: var(--primary); margin-bottom: 20px; }
        .welcome-title { font-size: 28px; font-weight: 900; margin-bottom: 12px; color: #1e293b; }
        .welcome-subtitle { font-size: 16px; color: var(--text-muted); max-width: 500px; line-height: 1.6; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="brand"><i class="fa-solid fa-wand-magic-sparkles"></i> Fibrex AI</div>
        <button class="new-chat-btn" onclick="clearChat()">
            <i class="fa-solid fa-plus"></i> محادثة جديدة
        </button>
    </header>

    <main class="chat-container" id="chat-container">
        <div class="welcome-screen" id="welcome-screen">
            <i class="fa-solid fa-gem welcome-icon"></i>
            <h1 class="welcome-title">Fibrex AI | خبير الموضة السودانية</h1>
            <p class="welcome-subtitle">مرحباً بك! أنا هنا لمساعدتك في اختيار أرقى الثياب، الجلابيات، وتنسيق الأقمشة السودانية الفاخرة.</p>
        </div>
        <div id="messages-list"></div>
        <div class="typing-indicator" id="typing-indicator">
            <div class="typing-content">
                <div class="avatar ai"><i class="fa-solid fa-sparkles"></i></div>
                <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>
    </main>

    <footer class="input-container">
        <div class="input-box">
            <textarea id="user-input" placeholder="اسأل عن أنواع الثياب، الأقمشة، أو التنسيقات..." rows="1" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="send-btn" onclick="sendMessage()"><i class="fa-solid fa-arrow-up"></i></button>
        </div>
    </footer>

    <script>
        const GROQ_API_KEY = "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";
        const MODEL = "llama-3.3-70b-versatile";

        const chatContainer = document.getElementById('chat-container');
        const messagesList = document.getElementById('messages-list');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        const welcomeScreen = document.getElementById('welcome-screen');

        const systemPrompt = `أنت "Fibrex AI"، الخبير الأول في الأزياء والموضة السودانية. 
أنت تعمل لصالح متجر "Fibrex" المتخصص في الملابس السودانية الراقية.
شخصيتك: ودود، لبق، ومحترف. استخدم كلمات سودانية ترحيبية مثل "حبابك" و "نورتنا".
قواعد صارمة:
1- لا تخترع عروضاً أو أسعاراً من عندك.
2- إذا سُئلت عن العروض، وجه العميل لرؤية التحديثات في واجهة المتجر الرئيسية.
3- ركز على تقديم قيمة فنية (شرح أنواع الأقمشة مثل التوتل الأصلي، السويسري، الحرير، وتنسيق الألوان).
4- أجب باللغة العربية الفصحى الممزوجة بلمسة سودانية مهذبة.`;

        function autoResize(textarea) {
            textarea.style.height = '40px';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            welcomeScreen.style.display = 'none';
            appendMessage('user', text);
            userInput.value = '';
            autoResize(userInput);
            setLoading(true);

            try {
                const response = await fetchGroqChat(text);
                appendMessage('ai', response);
            } catch (error) {
                appendMessage('ai', "عذراً، واجهت مشكلة في الاتصال. يرجى المحاولة مرة أخرى.");
            } finally {
                setLoading(false);
            }
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}-message`;
            const icon = role === 'user' ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-sparkles"></i>';
            const content = role === 'ai' ? marked.parse(text) : text;

            wrapper.innerHTML = `
                <div class="message-content">
                    <div class="avatar ${role}">${icon}</div>
                    <div class="text-content">${content}</div>
                </div>`;
            messagesList.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function fetchGroqChat(userText) {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${GROQ_API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userText }
                    ],
                    temperature: 0.7,
                    max_tokens: 1024
                })
            });

            if (!response.ok) throw new Error("API Error");
            const data = await response.json();
            return data.choices[0].message.content;
        }

        function setLoading(isLoading) {
            typingIndicator.style.display = isLoading ? 'block' : 'none';
            sendBtn.disabled = isLoading;
            if (isLoading) chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function clearChat() {
            messagesList.innerHTML = '';
            welcomeScreen.style.display = 'flex';
            userInput.focus();
        }
    </script>
</body>
</html>
